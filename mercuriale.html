<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercuriale - Gestion Culinaire</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <h1>Mercuriale</h1>
        <nav>
            <a href="index.html">Tableau de Bord</a>
            <a href="recettes.html">Recettes</a>
            <a href="mercuriale.html" class="active">Mercuriale</a>
            <a href="bon-economat.html">Bons d'économat</a>
        </nav>
    </header>

    <main id="app-container">
        <div class="page-header">
            <h2>Liste des Denrées</h2>
            <div class="header-actions">
                <input type="search" id="search-ingredient" placeholder="Rechercher une denrée...">
                <button id="add-ingredient-btn" class="button-primary">Ajouter une denrée</button>
            </div>
        </div>

        <div class="table-container">
            <table id="mercuriale-table">
                <thead>
                    <tr>
                        <th>Intitulé</th>
                        <th>Unité</th>
                        <th>Prix HT / unité</th>
                        <th>Famille</th>
                        <th>Sous-famille</th>
                        <th>Allergènes</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Lignes de denrées injectées par JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modale pour ajouter/modifier une denrée -->
    <div id="ingredient-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <form id="ingredient-form">
                <h3 id="modal-title">Ajouter une denrée</h3>
                <input type="hidden" id="ingredient-id">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="ingredient-name">Intitulé</label>
                        <input type="text" id="ingredient-name" required>
                    </div>
                    <div class="form-group">
                        <label for="ingredient-unit">Unité (kg, L, pièce...)</label>
                        <input type="text" id="ingredient-unit" required>
                    </div>
                    <div class="form-group">
                        <label for="ingredient-price">Prix HT / unité</label>
                        <input type="number" id="ingredient-price" step="0.001" min="0"
                            placeholder="Laissez vide si non connu">
                    </div>
                    <div class="form-group">
                        <label for="ingredient-family">Famille</label>
                        <input type="text" id="ingredient-family" placeholder="Ex: Légumerie">
                    </div>
                    <div class="form-group">
                        <label for="ingredient-subfamily">Sous-famille</label>
                        <input type="text" id="ingredient-subfamily" placeholder="Ex: Fruits">
                    </div>
                </div>

                <!-- Section allergènes -->
                <div class="form-section">
                    <h4>⚠️ Allergènes (Règlement UE 1169/2011)</h4>
                    <p class="form-hint">Sélectionnez les allergènes présents dans cet ingrédient.</p>
                    <div id="allergen-checkboxes" class="allergen-checkbox-grid">
                        <!-- Les checkboxes sont générées par JavaScript -->
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="button-secondary">Annuler</button>
                    <button type="submit" class="button-primary">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>

</html>
